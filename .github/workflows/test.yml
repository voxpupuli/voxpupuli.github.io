name: Test

# Required to allow sticky-pull-request-comment to work
permissions:
  pull-requests: write

on:
  - pull_request
  - push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # jekyll-last-modified-at needs the full git history to derive
          # correct "last updated" dates; a shallow clone reports the head
          # commit for every file, so the preview would not match production.
          fetch-depth: 0
      - name: Install Ruby 3
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: '3.0'
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake test
      - name: Build jekyll html
        run: bundle exec rake build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload-preview
        with:
          name: preview
          path: _site/
          retention-days: 7
          overwrite: true
          compression-level: 9
          if-no-files-found: error
