name: Deploy

on:
  push:
    branches:
      - master

# Allow this workflow to deploy to GitHub Pages via OIDC
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, without cancelling in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # jekyll-last-modified-at derives the "last updated" date from the
          # git history, so we need the full history rather than a shallow clone.
          fetch-depth: 0
      - name: Install Ruby 3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Build jekyll html
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
